# Cisco Modeling Labs (CML) 2.x Lab Topology
# Format matches CML export: annotations, nodes list (id/label/node_definition/interfaces), links (n1/n2/i1/i2), lab.
# 13 nodes: 3 IOSv, 2 unmanaged switches, 1 External Connector, 1 jump host, 6 Linux. Limits: 30 GB RAM, 20 vCPU.

