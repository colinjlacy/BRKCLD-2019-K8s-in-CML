                br_netfilter
            - path: /etc/sysctl.d/99-kubernetes.conf
              content: |
                net.bridge.bridge-nf-call-iptables  = 1
                net.bridge.bridge-nf-call-ip6tables = 1
                net.ipv4.ip_forward                 = 1
            - path: /usr/local/bin/k3s-join.sh
              permissions: '0755'
              content: |
                #!/bin/bash
                for i in $(seq 1 60); do
                  TOKEN=$(curl -sf http://10.10.0.11:8999/node-token) && [ -n "$TOKEN" ] && break
                  sleep 5
                done
                TOKEN=$(curl -sf http://10.10.0.11:8999/node-token)
                for j in $(seq 1 24); do
                  curl -sk --connect-timeout 5 https://10.10.0.11:6443/version >/dev/null && break
                  sleep 15
                done
                curl -sfL https://get.k3s.io | K3S_URL=https://10.10.0.11:6443 K3S_TOKEN="$TOKEN" sh -s - agent --node-ip=10.10.0.21
          package_update: true
