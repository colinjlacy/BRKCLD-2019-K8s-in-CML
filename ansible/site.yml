---
# K3s + Cilium from jump-1: ansible-playbook site.yml
# Prerequisites: network up, cloud-init done, repo on jump (e.g. ~/BRKCLD-2019-K8s-in-CML/ansible).
# If K3s was installed previously without per-cluster CIDRs, remove /etc/systemd/system/k3s.service on each CP before re-run.

- name: Wait for SSH on all K8s nodes (from jump-1)
  hosts: k8s_nodes
  gather_facts: false
  become: false
  any_errors_fatal: true
  tasks:
    - name: Wait for port 22 (must succeed on every node before real SSH plays)
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        delay: 0
        sleep: 5
        timeout: 1200
      delegate_to: localhost

- name: Linux prep for Kubernetes (all cluster nodes)
  hosts: k8s_nodes
  become: true
  tasks:
    - name: Ensure kernel modules for Kubernetes
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: "0644"

    - name: Load modules now
      ansible.builtin.command: modprobe {{ item }}
      changed_when: true
      failed_when: false
      loop:
        - overlay
        - br_netfilter

    - name: Sysctl for Kubernetes
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        mode: "0644"

    - name: Apply sysctl
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-kubernetes.conf
      changed_when: true

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: true
      failed_when: false

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        state: absent
        regexp: '^[^#]*\sswap\s'

    # cloud-init runcmd runs apt-get on first boot; avoid "Could not get lock ... apt/lists/lock"
    - name: Wait for apt/dpkg locks to clear (cloud-init)
      ansible.builtin.shell: |
        end=$((SECONDS + 1200))
        while [ "$SECONDS" -lt "$end" ]; do
          held=0
          if command -v fuser >/dev/null 2>&1; then
            fuser /var/lib/apt/lists/lock >/dev/null 2>&1 && held=1 || true
            fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && held=1 || true
            fuser /var/lib/dpkg/lock >/dev/null 2>&1 && held=1 || true
          else
            pgrep -x apt-get >/dev/null 2>&1 && held=1 || true
            pgrep -x apt >/dev/null 2>&1 && held=1 || true
            pgrep -f unattended-upgrade >/dev/null 2>&1 && held=1 || true
          fi
          if [ "$held" -eq 0 ]; then
            exit 0
          fi
          sleep 5
        done
        echo "Timed out waiting for apt/dpkg locks to clear" >&2
        exit 1
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install curl (K3s install script)
      ansible.builtin.apt:
        name: curl
        state: present
        update_cache: true

- name: Install K3s server — both control planes (parallel)
  hosts: k8s_control
  become: true
  tasks:
    - name: Install K3s server (CNI-less, explicit pod/service CIDRs for Cilium)
      ansible.builtin.shell: |
        set -e
        curl -sfL https://get.k3s.io | sh -s - server \
          --node-ip={{ k3s_cp_api_ip }} \
          --cluster-cidr={{ k3s_cluster_cidr }} \
          --service-cidr={{ k3s_service_cidr }} \
          --flannel-backend=none \
          --disable=traefik,servicelb \
          --disable-network-policy \
          --disable-kube-proxy
      args:
        creates: /etc/systemd/system/k3s.service

    - name: Enable and start k3s
      ansible.builtin.systemd:
        name: k3s
        enabled: true
        state: started

- name: Wait for Kubernetes API (TCP) — both clusters (parallel async)
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Start wait for 6443 on k8s-a-cp
      ansible.builtin.wait_for:
        host: 10.10.0.11
        port: 6443
        timeout: 300
      async: 360
      poll: 0
      register: wait_api_a

    - name: Start wait for 6443 on k8s-b-cp
      ansible.builtin.wait_for:
        host: 10.20.0.11
        port: 6443
        timeout: 300
      async: 360
      poll: 0
      register: wait_api_b

    - name: Wait for k8s-a-cp API check to complete
      ansible.builtin.async_status:
        jid: "{{ wait_api_a.ansible_job_id }}"
      register: wait_api_a_poll
      until: wait_api_a_poll.finished | default(false)
      failed_when: wait_api_a_poll.failed | default(false)
      retries: 200
      delay: 2

    - name: Wait for k8s-b-cp API check to complete
      ansible.builtin.async_status:
        jid: "{{ wait_api_b.ansible_job_id }}"
      register: wait_api_b_poll
      until: wait_api_b_poll.finished | default(false)
      failed_when: wait_api_b_poll.failed | default(false)
      retries: 200
      delay: 2

- name: Read join token — both control planes (parallel)
  hosts: k8s_control
  gather_facts: false
  become: true
  tasks:
    - name: Slurp node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_slurp

    - name: Publish token as host fact for workers
      ansible.builtin.set_fact:
        k3s_join_token: "{{ k3s_token_slurp.content | b64decode | trim }}"

- name: Join K3s agents — all workers (parallel)
  hosts: k8s_workers
  become: true
  vars:
    k3s_join_token: "{{ hostvars['k8s-a-cp']['k3s_join_token'] if inventory_hostname in groups['k8s_a_workers'] else hostvars['k8s-b-cp']['k3s_join_token'] }}"
  tasks:
    - name: Install K3s agent
      ansible.builtin.shell: |
        set -e
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ k3s_cp_api_ip }}:6443 K3S_TOKEN="{{ k3s_join_token }}" sh -s - agent --node-ip={{ ansible_host }}
      args:
        creates: /etc/systemd/system/k3s-agent.service

    - name: Enable and start k3s-agent
      ansible.builtin.systemd:
        name: k3s-agent
        enabled: true
        state: started

- name: Fetch kubeconfig and validate (on jump-1)
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    kube_dir: "/home/cisco/.kube"
  tasks:
    - name: Detect jump architecture for kubectl binary
      ansible.builtin.command: uname -m
      register: jump_uname_m
      changed_when: false

    - name: Set kubectl download arch
      ansible.builtin.set_fact:
        kubectl_dl_arch: "{{ 'arm64' if jump_uname_m.stdout in ['aarch64', 'arm64'] else 'amd64' }}"

    - name: Fetch kubectl stable version
      ansible.builtin.uri:
        url: https://dl.k8s.io/release/stable.txt
        return_content: true
      register: kubectl_stable_ver

    - name: Install kubectl (upstream binary to /usr/local/bin)
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_stable_ver.content | trim }}/bin/linux/{{ kubectl_dl_arch }}/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"
      become: true

    - name: Ensure ~/.kube
      ansible.builtin.file:
        path: "{{ kube_dir }}"
        state: directory
        mode: "0700"

    - name: Slurp kubeconfig from cluster A control plane
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      delegate_to: k8s-a-cp
      become: true
      register: kc_a

    - name: Slurp kubeconfig from cluster B control plane
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      delegate_to: k8s-b-cp
      become: true
      register: kc_b

    - name: Write kubeconfig cluster A
      ansible.builtin.copy:
        dest: "{{ kube_dir }}/k3s-a.yaml"
        content: "{{ kc_a.content | b64decode | replace('127.0.0.1', '10.10.0.11') }}"
        mode: "0600"

    - name: Write kubeconfig cluster B
      ansible.builtin.copy:
        dest: "{{ kube_dir }}/k3s-b.yaml"
        content: "{{ kc_b.content | b64decode | replace('127.0.0.1', '10.20.0.11') }}"
        mode: "0600"

    - name: kubectl get nodes — cluster A
      ansible.builtin.command: kubectl get nodes
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-a.yaml"
      register: nodes_a
      changed_when: false

    - name: Show cluster A nodes
      ansible.builtin.debug:
        var: nodes_a.stdout_lines

    - name: kubectl get nodes — cluster B
      ansible.builtin.command: kubectl get nodes
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-b.yaml"
      register: nodes_b
      changed_when: false

    - name: Show cluster B nodes
      ansible.builtin.debug:
        var: nodes_b.stdout_lines

- name: Install Helm on jump-1
  hosts: localhost
  gather_facts: false
  become: true
  tasks:
    - name: Download Helm install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get-helm-3
        mode: "0755"

    - name: Install Helm 3 to /usr/local/bin
      ansible.builtin.command: /tmp/get-helm-3
      args:
        creates: /usr/local/bin/helm

- name: Cilium Helm repo on jump-1
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Add and update Cilium Helm repo
      ansible.builtin.shell: |
        set -e
        helm repo add cilium https://helm.cilium.io/ 2>/dev/null || true
        helm repo update
      changed_when: true

- name: Install Cilium on cluster A (kube-proxy replacement + Hubble)
  hosts: localhost
  gather_facts: false
  vars:
    kube_cfg: /home/cisco/.kube/k3s-a.yaml
  tasks:
    - name: Helm upgrade --install cilium (cluster A)
      ansible.builtin.command:
        argv:
          - helm
          - upgrade
          - --install
          - cilium
          - cilium/cilium
          - --version
          - "{{ cilium_helm_chart_version }}"
          - --namespace
          - kube-system
          - --create-namespace
          - --set
          - "cluster.name={{ hostvars['k8s-a-cp'].cilium_cluster_name }}"
          - --set
          - "cluster.id={{ hostvars['k8s-a-cp'].cilium_cluster_id }}"
          - --set
          - kubeProxyReplacement=true
          - --set
          - ipam.mode=kubernetes
          - --set
          - "ipv4NativeRoutingCIDR={{ hostvars['k8s-a-cp'].k3s_cluster_cidr }}"
          - --set
          - routingMode=tunnel
          - --set
          - hubble.enabled=true
          - --set
          - hubble.relay.enabled=true
          - --set
          - hubble.ui.enabled=true
          - --set
          - "k8sServiceHost={{ hostvars['k8s-a-cp'].k3s_cp_api_ip }}"
          - --set
          - k8sServicePort=6443
      environment:
        KUBECONFIG: "{{ kube_cfg }}"

    - name: Wait for Cilium DaemonSet ready (cluster A)
      ansible.builtin.command: kubectl rollout status daemonset/cilium -n kube-system --timeout=600s
      environment:
        KUBECONFIG: "{{ kube_cfg }}"

    - name: Wait for Hubble Relay deployment (cluster A)
      ansible.builtin.command: kubectl rollout status deployment/hubble-relay -n kube-system --timeout=300s
      environment:
        KUBECONFIG: "{{ kube_cfg }}"

    - name: Wait for Hubble UI deployment (cluster A)
      ansible.builtin.command: kubectl rollout status deployment/hubble-ui -n kube-system --timeout=300s
      environment:
        KUBECONFIG: "{{ kube_cfg }}"

- name: Install Cilium on cluster B (kube-proxy replacement + Hubble)
  hosts: localhost
  gather_facts: false
  vars:
    kube_cfg: /home/cisco/.kube/k3s-b.yaml
  tasks:
    - name: Helm upgrade --install cilium (cluster B)
      ansible.builtin.command:
        argv:
          - helm
          - upgrade
          - --install
          - cilium
          - cilium/cilium
          - --version
          - "{{ cilium_helm_chart_version }}"
          - --namespace
          - kube-system
          - --create-namespace
          - --set
          - "cluster.name={{ hostvars['k8s-b-cp'].cilium_cluster_name }}"
          - --set
          - "cluster.id={{ hostvars['k8s-b-cp'].cilium_cluster_id }}"
          - --set
          - kubeProxyReplacement=true
          - --set
          - ipam.mode=kubernetes
          - --set
          - "ipv4NativeRoutingCIDR={{ hostvars['k8s-b-cp'].k3s_cluster_cidr }}"
          - --set
          - routingMode=tunnel
          - --set
          - hubble.enabled=true
          - --set
          - hubble.relay.enabled=true
          - --set
          - hubble.ui.enabled=true
          - --set
          - "k8sServiceHost={{ hostvars['k8s-b-cp'].k3s_cp_api_ip }}"
          - --set
          - k8sServicePort=6443
      environment:
        KUBECONFIG: "{{ kube_cfg }}"

    - name: Wait for Cilium DaemonSet ready (cluster B)
      ansible.builtin.command: kubectl rollout status daemonset/cilium -n kube-system --timeout=600s
      environment:
        KUBECONFIG: "{{ kube_cfg }}"

    - name: Wait for Hubble Relay deployment (cluster B)
      ansible.builtin.command: kubectl rollout status deployment/hubble-relay -n kube-system --timeout=300s
      environment:
        KUBECONFIG: "{{ kube_cfg }}"

    - name: Wait for Hubble UI deployment (cluster B)
      ansible.builtin.command: kubectl rollout status deployment/hubble-ui -n kube-system --timeout=300s
      environment:
        KUBECONFIG: "{{ kube_cfg }}"

- name: Install Cilium and Hubble CLIs on jump-1
  hosts: localhost
  gather_facts: false
  become: true
  vars:
    kube_dir: /home/cisco/.kube
  tasks:
    - name: Detect jump architecture for CLI binaries
      ansible.builtin.command: uname -m
      register: jump_arch
      changed_when: false

    - name: Set CLI arch (amd64 or arm64)
      ansible.builtin.set_fact:
        cli_dl_arch: "{{ 'arm64' if jump_arch.stdout in ['aarch64', 'arm64'] else 'amd64' }}"

    - name: Download Cilium CLI tarball
      ansible.builtin.get_url:
        url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version }}/cilium-linux-{{ cli_dl_arch }}.tar.gz"
        dest: /tmp/cilium-cli.tar.gz
        mode: "0644"

    - name: Extract Cilium CLI
      ansible.builtin.unarchive:
        src: /tmp/cilium-cli.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install cilium to /usr/local/bin
      ansible.builtin.copy:
        src: /tmp/cilium
        dest: /usr/local/bin/cilium
        mode: "0755"
        remote_src: true

    - name: Download Hubble CLI tarball
      ansible.builtin.get_url:
        url: "https://github.com/cilium/hubble/releases/download/{{ hubble_cli_version }}/hubble-linux-{{ cli_dl_arch }}.tar.gz"
        dest: /tmp/hubble-cli.tar.gz
        mode: "0644"

    - name: Extract Hubble CLI
      ansible.builtin.unarchive:
        src: /tmp/hubble-cli.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install hubble to /usr/local/bin
      ansible.builtin.copy:
        src: /tmp/hubble
        dest: /usr/local/bin/hubble
        mode: "0755"
        remote_src: true

- name: Cilium status and node readiness
  hosts: localhost
  gather_facts: false
  vars:
    kube_dir: /home/cisco/.kube
  tasks:
    - name: cilium status --wait (cluster A)
      ansible.builtin.command: cilium status --wait
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-a.yaml"
      changed_when: false

    - name: cilium status --wait (cluster B)
      ansible.builtin.command: cilium status --wait
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-b.yaml"
      changed_when: false

    - name: kubectl get nodes (cluster A)
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-a.yaml"
      register: kn_a
      changed_when: false

    - name: kubectl get nodes (cluster B)
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-b.yaml"
      register: kn_b
      changed_when: false

    - name: Assert all nodes Ready (cluster A)
      ansible.builtin.shell: |
        set -e
        test "$(kubectl get nodes --no-headers | awk '{print $2}' | sort -u)" = "Ready"
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-a.yaml"
      changed_when: false

    - name: Assert all nodes Ready (cluster B)
      ansible.builtin.shell: |
        set -e
        test "$(kubectl get nodes --no-headers | awk '{print $2}' | sort -u)" = "Ready"
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-b.yaml"
      changed_when: false

    - name: Show Cilium endpoints (cluster A)
      ansible.builtin.command: kubectl get cep -A
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-a.yaml"
      register: cep_a
      changed_when: false

    - name: Show Cilium endpoints (cluster B)
      ansible.builtin.command: kubectl get cep -A
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-b.yaml"
      register: cep_b
      changed_when: false

    - name: Summary nodes and Cilium endpoints
      ansible.builtin.debug:
        msg:
          - "=== Cluster A nodes ==="
          - "{{ kn_a.stdout }}"
          - "=== Cluster A CEP ==="
          - "{{ cep_a.stdout }}"
          - "=== Cluster B nodes ==="
          - "{{ kn_b.stdout }}"
          - "=== Cluster B CEP ==="
          - "{{ cep_b.stdout }}"

- name: Validate pod, Service, and DNS per cluster
  hosts: localhost
  gather_facts: false
  vars:
    kube_dir: /home/cisco/.kube
  tasks:
    - name: Cluster A — deploy nginx + ClusterIP, curl via in-cluster client
      ansible.builtin.shell: |
        set -e
        kubectl delete deployment net-verify-a service net-verify-a --ignore-not-found --wait=true
        kubectl create deployment net-verify-a --image=nginx:1.25-alpine --replicas=2
        kubectl rollout status deployment/net-verify-a --timeout=120s
        kubectl expose deployment net-verify-a --port=80 --target-port=80 --name=net-verify-a
        kubectl delete pod net-verify-a-curl --ignore-not-found --wait=true
        kubectl run net-verify-a-curl --restart=Never --image=curlimages/curl:8.5.0 -- \
          curl -sS -m 15 http://net-verify-a.default.svc.cluster.local
        kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/net-verify-a-curl --timeout=120s
        kubectl logs net-verify-a-curl
        kubectl delete pod net-verify-a-curl --wait=true
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-a.yaml"

    - name: Cluster A — CoreDNS lookup
      ansible.builtin.shell: |
        set -e
        kubectl delete pod net-dns-a --ignore-not-found --wait=true
        kubectl run net-dns-a --restart=Never --image=busybox:1.36 -- \
          nslookup kubernetes.default.svc.cluster.local
        kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/net-dns-a --timeout=90s
        kubectl logs net-dns-a
        kubectl delete pod net-dns-a --wait=true
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-a.yaml"

    - name: Cluster B — deploy nginx + ClusterIP, curl via in-cluster client
      ansible.builtin.shell: |
        set -e
        kubectl delete deployment net-verify-b service net-verify-b --ignore-not-found --wait=true
        kubectl create deployment net-verify-b --image=nginx:1.25-alpine --replicas=2
        kubectl rollout status deployment/net-verify-b --timeout=120s
        kubectl expose deployment net-verify-b --port=80 --target-port=80 --name=net-verify-b
        kubectl delete pod net-verify-b-curl --ignore-not-found --wait=true
        kubectl run net-verify-b-curl --restart=Never --image=curlimages/curl:8.5.0 -- \
          curl -sS -m 15 http://net-verify-b.default.svc.cluster.local
        kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/net-verify-b-curl --timeout=120s
        kubectl logs net-verify-b-curl
        kubectl delete pod net-verify-b-curl --wait=true
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-b.yaml"

    - name: Cluster B — CoreDNS lookup
      ansible.builtin.shell: |
        set -e
        kubectl delete pod net-dns-b --ignore-not-found --wait=true
        kubectl run net-dns-b --restart=Never --image=busybox:1.36 -- \
          nslookup kubernetes.default.svc.cluster.local
        kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/net-dns-b --timeout=90s
        kubectl logs net-dns-b
        kubectl delete pod net-dns-b --wait=true
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-b.yaml"

    - name: Remove transient verify workloads (keep cluster clean for next phase)
      ansible.builtin.shell: |
        kubectl delete deployment net-verify-a service net-verify-a --ignore-not-found --wait=true
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-a.yaml"
      changed_when: true

    - name: Remove transient verify workloads cluster B
      ansible.builtin.shell: |
        kubectl delete deployment net-verify-b service net-verify-b --ignore-not-found --wait=true
      environment:
        KUBECONFIG: "{{ kube_dir }}/k3s-b.yaml"
      changed_when: true
