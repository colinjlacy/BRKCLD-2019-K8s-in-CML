# Lab inventory: run playbooks from jump-1 (e.g. cd to this directory, then ansible-playbook site.yml).
# Default SSH: user cisco, password in group_vars/all.yml (CML Ubuntu image).

[jump]
jump-1 ansible_host=10.30.0.10 ansible_connection=local

[k8s_a_control]
k8s-a-cp ansible_host=10.10.0.11 k3s_cp_api_ip=10.10.0.11

[k8s_a_workers]
k8s-a-w1 ansible_host=10.10.0.21 k3s_cp_api_ip=10.10.0.11
k8s-a-w2 ansible_host=10.10.0.22 k3s_cp_api_ip=10.10.0.11

[k8s_b_control]
k8s-b-cp ansible_host=10.20.0.11 k3s_cp_api_ip=10.20.0.11

[k8s_b_workers]
k8s-b-w1 ansible_host=10.20.0.21 k3s_cp_api_ip=10.20.0.11
k8s-b-w2 ansible_host=10.20.0.22 k3s_cp_api_ip=10.20.0.11

[k8s_control:children]
k8s_a_control
k8s_b_control

[k8s_workers:children]
k8s_a_workers
k8s_b_workers

[k8s_nodes:children]
k8s_control
k8s_workers

[ubuntu_lab:children]
jump
k8s_nodes
